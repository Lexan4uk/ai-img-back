# Драйвер PostgreSQL (Testcontainers подставит URL/user/password динамически)
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase — те же миграции что и в проде, чтобы тестовая БД была идентична
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog-master.xml

# Отладочный лог — видно SQL-запросы при падении тестов
logging.level.com.example.ai_img_back=DEBUG
