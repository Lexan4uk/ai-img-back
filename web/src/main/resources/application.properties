spring.application.name=ai-img-back
spring.datasource.url=jdbc:postgresql://localhost:5432/ai-img-back
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog-master.xml

# ========================================
#   AI-провайдеры
# ========================================

# --- Шаблон промпта ---
# Переменные: {type} — промпт типа, {style} — промпт стиля, {prompt} — текст пользователя
ai.prompt-template=Create an image of type: {type}. Style: {style}. Description: {prompt}. Avoid unnecessary text in the image.

# --- Основной (платный): OpenAI GPT Image ---
# Вставь свой ключ сюда (или через переменную окружения OPENAI_API_KEY)
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=gpt-image-1.5
ai.openai.url=https://api.openai.com/v1/images/generations
ai.openai.timeout-seconds=90
ai.openai.max-retries=3

# --- Второй: Stability AI (Stable Image Core) ---
# Вставь свой ключ сюда (или через переменную окружения STABILITY_API_KEY)
# 3 кредита за генерацию, разрешение 1.5 мегапикселя
ai.stability.api-key=${STABILITY_API_KEY:}
ai.stability.url=https://api.stability.ai/v2beta/stable-image/generate/core
ai.stability.timeout-seconds=90
ai.stability.max-retries=2
ai.stability.output-format=png

# --- Прокси (proxy-seller.io) ---
ai.proxy.enabled=false
ai.proxy.host=
ai.proxy.port=10000
ai.proxy.username=
ai.proxy.password=
ai.proxy.type=HTTP

# --- Хранение изображений ---
ai.images.output-dir=generated-imgs

# --- Провайдер по умолчанию: openai / stability / auto ---
ai.default-provider=openai
